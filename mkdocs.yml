site_name: Bloom Docs
site_url: https://docs.bloom.directory/
repo_url: https://github.com/bloom-directory/docs
repo_name: bloom-directory/docs
edit_uri: edit/master/docs/

theme:
  name: material
  logo: assets/bloom-mark.svg
  favicon: assets/bloom-mark.svg
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      accent: teal

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

nav:
  - Home: index.md
  - Petals:
      - Overview: petals/index.md
      - Quickstart: petals/quickstart.md
      - Petal Model: petals/model.md
      - Authoring Petals: petals/authoring.md
      - PTBs and Pipes: petals/ptbs-and-pipes.md
      - Testing Petals: petals/testing.md
  - Reference:
      - Project Map: reference/project-map.md
      - Hosting: reference/hosting.md

